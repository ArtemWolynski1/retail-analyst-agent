<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 452" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="14">
  <rect x="6" y="6" width="708" height="440" rx="10" fill="#1b1b26"/>
  <rect x="6" y="6" width="708" height="34" rx="10" fill="#262633"/>
  <rect x="6" y="26" width="708" height="14" fill="#262633"/>
  <circle cx="28" cy="23" r="5" fill="#ff5f56"/>
  <circle cx="46" cy="23" r="5" fill="#ffbd2e"/>
  <circle cx="64" cy="23" r="5" fill="#27c93f"/>
  <text x="360" y="27" fill="#8b8b9a" text-anchor="middle" font-size="12">retail analyst agent — python -m agent.cli --debug</text>

  <text x="24" y="70"><tspan fill="#56b6c2">you › </tspan><tspan fill="#e6e6ef">Why are users in Texas underspending compared to California?</tspan></text>

  <text x="24" y="104" fill="#e5c07b">🧠 A "why" question — spend per user = order frequency × avg order value.</text>
  <text x="44" y="124" fill="#e5c07b">Per-user rates matter; raw state totals would mislead.</text>

  <text x="24" y="160"><tspan fill="#98c379">→ run_sql </tspan><tspan fill="#7f7f8f">spend/user, orders/user, avg order value — by state</tspan></text>

  <text y="196" fill="#7f7f8f" font-size="12"><tspan x="24">←</tspan><tspan x="150">spend/user</tspan><tspan x="320">orders/user</tspan><tspan x="500">avg order</tspan></text>
  <text y="217" fill="#abb2bf"><tspan x="44">California</tspan><tspan x="150">$56.29</tspan><tspan x="320">0.69</tspan><tspan x="500">$81.25</tspan></text>
  <text y="238" fill="#abb2bf"><tspan x="44">Texas</tspan><tspan x="150">$58.89</tspan><tspan x="320">0.69</tspan><tspan x="500">$85.41</tspan></text>

  <text x="24" y="272" fill="#e5c07b">🧠 That's not what I expected. Texas is NOT underspending — its spend</text>
  <text x="44" y="292" fill="#e5c07b">per user is higher. The premise of the question is inaccurate.</text>

  <rect x="16" y="312" width="688" height="122" rx="8" fill="#20202c" stroke="#3a3a4a"/>
  <text x="32" y="342" fill="#e6e6ef">Based on the data, users in Texas are <tspan fill="#98c379" font-weight="bold">not</tspan> underspending compared to</text>
  <text x="32" y="364" fill="#e6e6ef">California. In fact, Texas has a slightly higher spend per user and</text>
  <text x="32" y="386" fill="#e6e6ef">average order value.</text>
  <text x="32" y="416" fill="#8b8b9a" font-size="12">— the agent corrected the question's false premise from data, rather than inventing a cause.</text>
</svg>
