<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 470" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="14">
<rect x="6" y="6" width="708" height="458" rx="10" fill="#1b1b26"/>
<rect x="6" y="6" width="708" height="34" rx="10" fill="#262633"/>
<rect x="6" y="30" width="708" height="10" fill="#262633"/>
<circle cx="28" cy="23" r="5" fill="#ff5f56"/>
<circle cx="46" cy="23" r="5" fill="#ffbd2e"/>
<circle cx="64" cy="23" r="5" fill="#27c93f"/>
<text x="360" y="27" fill="#8b8b9a" text-anchor="middle" font-size="12">retail analyst agent — python -m agent.cli --debug</text>
<rect x="16" y="322" width="688" height="76" rx="8" fill="#20202c" stroke="#3a3a4a"/>
<text x="24" y="52" font-size="14"><tspan fill="#56b6c2">you › </tspan><tspan fill="#e6e6ef">Why are users in Texas underspending compared to California?</tspan></text>
<text x="24" y="96" font-size="14"><tspan fill="#e5c07b">🧠 </tspan><tspan fill="#e5c07b">A "why" question — spend per user = order frequency x avg order value;</tspan></text>
<text x="24" y="118" fill="#e5c07b" font-size="14">  per-user rates matter, raw state totals would mislead.</text>
<text x="24" y="162" font-size="14"><tspan fill="#98c379">→ </tspan><tspan fill="#8f9f8a">run_sql  spend/user, orders/user, avg order value — by state</tspan></text>
<text x="24" y="184" font-size="14"><tspan fill="#7f7f8f">← </tspan><tspan fill="#abb2bf">state         spend/user   orders/user   avg order</tspan></text>
<text x="24" y="206" fill="#abb2bf" font-size="14">California   $56.29       0.69          $81.25</text>
<text x="24" y="228" fill="#abb2bf" font-size="14">Texas        $58.89       0.69          $85.41</text>
<text x="24" y="272" font-size="14"><tspan fill="#e5c07b">🧠 </tspan><tspan fill="#e5c07b">That's not what I expected. Texas is NOT underspending — its spend per user</tspan></text>
<text x="24" y="294" fill="#e5c07b" font-size="14">  is higher. The premise of the question is inaccurate.</text>
<text x="24" y="338" fill="#e6e6ef" font-size="14">Based on the data, users in Texas are not underspending compared to</text>
<text x="24" y="360" fill="#e6e6ef" font-size="14">California. In fact, Texas has a slightly higher spend per user and</text>
<text x="24" y="382" fill="#e6e6ef" font-size="14">average order value.</text>
<text x="24" y="426" fill="#8b8b9a" font-size="12">— the agent corrected the question's false premise from data, not a guess.</text>
</svg>
