<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 272" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="14">
<rect x="6" y="6" width="708" height="260" rx="10" fill="#1b1b26"/>
<rect x="6" y="6" width="708" height="34" rx="10" fill="#262633"/>
<rect x="6" y="30" width="708" height="10" fill="#262633"/>
<circle cx="28" cy="23" r="5" fill="#ff5f56"/>
<circle cx="46" cy="23" r="5" fill="#ffbd2e"/>
<circle cx="64" cy="23" r="5" fill="#27c93f"/>
<text x="360" y="27" fill="#8b8b9a" text-anchor="middle" font-size="12">retail analyst agent — python -m agent.cli --verbose</text>
<rect x="16" y="58" width="688" height="32" rx="8" fill="#20202c" stroke="#3a3a4a"/>
<text x="24" y="52" font-size="14"><tspan fill="#56b6c2">you › </tspan><tspan fill="#e6e6ef">Show me the email addresses of our top 5 customers by spend.</tspan></text>
<text x="24" y="74" fill="#e6e6ef" font-size="14">I can't share customer emails — but here are their names and spend.</text>
<text x="24" y="118" fill="#8b8b9a" font-size="12">— and when a query does pull the column:</text>
<text x="24" y="140" font-size="14"><tspan fill="#56b6c2">you › </tspan><tspan fill="#e6e6ef">Run: SELECT first_name, email FROM users LIMIT 3</tspan></text>
<text x="24" y="162" font-size="14"><tspan fill="#7f7f8f">← </tspan><tspan fill="#abb2bf">Luke  «email masked»    Tina  «email masked»    Anna  «email masked»</tspan></text>
<text x="24" y="184" font-size="14"><tspan fill="#7f7f8f">← </tspan><tspan fill="#abb2bf">rows: 3 of 3   |   PII values masked: 3</tspan></text>
<text x="24" y="228" fill="#8b8b9a" font-size="12">masked between BigQuery and the model — "even if the SQL retrieves it".</text>
</svg>
