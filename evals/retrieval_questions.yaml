# Retrieval golden set: question → acceptable trio ids (any counts as a hit).
#
# query_class drives the per-class breakdown:
#   paraphrase — no token overlap with the trio; dense retrieval's home turf
#   lexical    — near-verbatim distinctive tokens; the FTS leg should carry
#   ambiguous  — several trios are legitimately relevant; any-of scoring
#
# Fairness rule: paraphrases are written from the MANAGER's vocabulary
# (money, warehouse, shoppers), never the analyst's (revenue, DC, sessions) —
# if the query shares the trio's words, it belongs in the lexical class.

- id: earn-last-month
  question: How much did we earn last month?
  expected: [revenue-definition]
  query_class: paraphrase

- id: merchandise-types
  question: Which kinds of merchandise sell best?
  expected: [revenue-by-category, revenue-by-brand]
  query_class: paraphrase

- id: basket-size
  question: How much does a typical purchase come to in dollars?
  expected: [average-order-value]
  query_class: paraphrase

- id: where-profit
  question: Where do we actually make our money after costs?
  expected: [profit-margin-by-category]
  query_class: paraphrase

- id: ad-channels
  question: Which ad channels bring in the most sales?
  expected: [revenue-by-acquisition-channel]
  query_class: paraphrase

- id: cancel-often
  question: How often do people back out of their orders?
  expected: [cancellation-rate]
  query_class: paraphrase

- id: shipping-speed
  question: Are we getting quicker at sending stuff out?
  expected: [fulfillment-lag-trend]
  query_class: paraphrase

- id: package-wait
  question: How long do customers wait for their packages?
  expected: [avg-delivery-time]
  query_class: paraphrase

- id: warehouses-volume
  question: Which warehouses move the most product?
  expected: [dc-shipped-volume]
  query_class: paraphrase

- id: age-spending
  question: Do older shoppers spend more than younger ones?
  expected: [spend-by-age-group]
  query_class: paraphrase

- id: visitors-buying
  question: What fraction of visitors end up buying something?
  expected: [session-conversion-rate]
  query_class: paraphrase

- id: unsold-stock
  question: What stock has been gathering dust in the warehouse?
  expected: [slow-moving-inventory]
  query_class: paraphrase

- id: money-back
  question: How much money are we giving back to customers each month?
  expected: [refund-value-trend]
  query_class: paraphrase

- id: men-women-sales
  question: Do men or women bring us more business?
  expected: [revenue-by-gender]
  query_class: paraphrase

- id: state-comparison-why
  question: Why is Texas behind California in sales?
  expected: [why-state-underspending]
  query_class: paraphrase

- id: biggest-spenders
  question: Who are our biggest spenders?
  expected: [top-customers-by-spend]
  query_class: paraphrase

- id: customer-loyalty
  question: How loyal are our customers — do they come back?
  expected: [repeat-purchase-rate]
  query_class: paraphrase

- id: growth-check
  question: Are we growing?
  expected: [mom-revenue-growth, new-signups-trend]
  query_class: paraphrase

- id: lex-return-rate
  question: What's the return rate by product category?
  expected: [return-rate-by-category]
  query_class: lexical

- id: lex-cart-abandonment
  question: Show me cart abandonment numbers
  expected: [cart-abandonment-rate]
  query_class: lexical

- id: lex-order-status
  question: Break down orders by status
  expected: [order-status-breakdown]
  query_class: lexical

- id: lex-brand-top10
  question: Top 10 brands by revenue please
  expected: [revenue-by-brand]
  query_class: lexical

- id: lex-aov-channel
  question: Average order value by traffic source
  expected: [aov-by-channel]
  query_class: lexical

- id: lex-signups
  question: New user signups over the last 6 months
  expected: [new-signups-trend]
  query_class: lexical

- id: amb-sales-doing
  question: How are sales doing?
  expected: [mom-revenue-growth, revenue-definition, category-mix-shift]
  query_class: ambiguous

- id: amb-returns
  question: Tell me about our returns situation
  expected: [return-rate-by-category, returned-orders-trend, refund-value-trend]
  query_class: ambiguous

- id: amb-site-behavior
  question: What do people actually do on the site?
  expected: [avg-session-depth, session-conversion-rate, cart-abandonment-rate]
  query_class: ambiguous

- id: amb-worry-categories
  question: Which product categories should we be worried about?
  expected: [return-rate-by-category, slow-moving-inventory]
  query_class: ambiguous

